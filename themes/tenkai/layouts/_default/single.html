{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }}
      <span class="post-tags">
        {{ range . }}<a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag">{{ . }}</a> {{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
<nav class="post-nav">
  {{ with .PrevInSection }}<a class="prev" href="{{ .Permalink }}">← {{ .Title }}</a>{{ end }}
  {{ with .NextInSection }}<a class="next" href="{{ .Permalink }}">{{ .Title }} →</a>{{ end }}
</nav>
{{ end }}
