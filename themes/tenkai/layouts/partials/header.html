<header class="site-header">
  <nav class="site-nav">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-title">{{ .Site.Title }}</a>
    <div class="nav-links">
      <a href="{{ "posts/" | relURL }}">Archive</a>
      <a href="{{ "tags/" | relURL }}">Tags</a>
      <a href="{{ "index.xml" | absURL }}">RSS</a>
      <a href="{{ "mcp/" | relURL }}">MCP</a>
      <form class="nav-search" action="{{ "search/" | relURL }}" method="get">
        <input type="text" name="q" placeholder="search…" autocomplete="off" aria-label="Search posts" />
      </form>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">[LITE]</button>
    </div>
  </nav>
</header>
