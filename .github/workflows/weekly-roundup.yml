name: Weekly AI Roundup

on:
  schedule:
    - cron: '0 9 * * 1'  # 09:00 UTC Mondays (1hr after daily digest)
  workflow_dispatch:
    inputs:
      skip_research:
        description: 'Reuse cached roundup_research.json from last run'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  rebuild-index:
    needs: generate-roundup
    if: needs.generate-roundup.outputs.post_committed == 'true'
    uses: ./.github/workflows/rebuild-index.yml
    secrets: inherit

  publish:
    uses: ./.github/workflows/publish.yml
    needs: [generate-roundup, rebuild-index]
    if: always() && !failure() && !cancelled()
    secrets: inherit

  generate-roundup:
    outputs:
      post_committed: ${{ steps.commit.outputs.committed }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Guard — skip if today's roundup already exists
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d)-roundup.md"
          if [ -f "$POST" ]; then
            echo "Roundup $POST already exists, skipping."
            echo "SKIP_AGENTS=true" >> "$GITHUB_ENV"
          fi

      - name: Select models
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/model_selector.py

      - name: Topic agent
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/topic_agent.py

      - name: Research — restore cache or run fresh
        if: env.SKIP_AGENTS != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          USED_CACHE=false

          if [ "${{ inputs.skip_research }}" = "true" ]; then
            run_id=$(gh run list --workflow=weekly-roundup.yml --status=success --limit=5 \
              --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
            if [ -n "$run_id" ] && gh run download "$run_id" --name roundup-research-json --dir /tmp 2>/dev/null; then
              echo "Restored roundup_research.json from run $run_id"
              USED_CACHE=true
            else
              echo "No cached artifact found — running roundup agent instead"
            fi
          fi

          if [ "$USED_CACHE" = "false" ]; then
            python agents/roundup_agent.py
            echo "RAN_RESEARCH=true" >> "$GITHUB_ENV"
          fi

      - name: Upload roundup_research.json as artifact
        if: env.SKIP_AGENTS != 'true' && env.RAN_RESEARCH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: roundup-research-json
          path: /tmp/roundup_research.json
          retention-days: 7

      - name: Cooldown between agents
        if: env.SKIP_AGENTS != 'true' && env.RAN_RESEARCH == 'true'
        run: sleep 90

      - name: Run writing agent and validate (with retry)
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d)-roundup.md"
          for attempt in 1 2 3; do
            echo "=== Writing attempt $attempt ==="
            python agents/roundup_writer.py
            if python agents/validate_roundup.py "$POST"; then
              echo "Validation passed on attempt $attempt"
              exit 0
            fi
            echo "Validation failed, retrying in 30s..."
            rm -f "$POST"
            sleep 30
          done
          echo "All writing attempts failed" >&2
          exit 1

      - name: Commit post, seen.json, and roundup_topics.txt
        id: commit
        if: env.SKIP_AGENTS != 'true'
        run: |
          git config user.name "tenkai-bot"
          git config user.email "tenkai-bot@users.noreply.github.com"
          POST="content/posts/$(date -u +%Y-%m-%d)-roundup.md"
          git add "$POST" agents/seen.json
          if [ -f roundup_topics.txt ]; then git add roundup_topics.txt; fi
          git commit -m "post: $(date -u +%Y-%m-%d) weekly roundup [skip ci]"
          git pull --rebase
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly roundup failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The weekly roundup workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bot-failure'],
            })
