name: Restyle Posts

on:
  workflow_dispatch:
    inputs:
      dates:
        description: 'Space-separated dates to rewrite (e.g. "2026-03-14 2026-03-15"). Leave blank to rewrite all posts.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  restyle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rewrite agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "${{ inputs.dates }}" ]; then
            python agents/rewrite_agent.py ${{ inputs.dates }}
          else
            python agents/rewrite_agent.py
          fi

      - name: Commit restyled posts
        run: |
          git config user.name "tenkai-bot"
          git config user.email "tenkai-bot@users.noreply.github.com"
          git add content/posts/
          git diff --cached --quiet && echo "No changes." || git commit -m "style: restyle posts with updated tone"
          git push

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.0'
          extended: false

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: ''
