name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest
