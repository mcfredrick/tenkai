name: Rebuild Search Index

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull --rebase

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --group index
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5

      - name: Build search index
        run: python agents/build_index.py

      - name: Commit search index
        run: |
          git config user.name "tenkai-bot"
          git config user.email "tenkai-bot@users.noreply.github.com"
          git add static/search-index.json
          git diff --staged --quiet && echo "No index changes to commit" && exit 0
          git commit -m "chore: rebuild search index [skip ci]"
          git pull --rebase
          git push
